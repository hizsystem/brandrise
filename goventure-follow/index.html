    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }
  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column; align-items: center;
  }
  .logo-wrap {
    width: 80vw;
    max-width: 480px;
    margin-bottom: 32px;
  }
  .logo-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }
  .title {
    font-size: 24px; font-weight: 700; color: #fff;
    text-align: center; line-height: 1.35; margin-bottom: 10px; letter-spacing: -0.02em;
  }
  .subtitle {
    font-size: 14px; color: rgba(255,255,255,0.55);
    text-align: center; line-height: 1.7; margin-bottom: 40px; max-width: 320px;
  }
  .accounts { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .account-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 16px; padding: 16px 20px; text-decoration: none;
    display: flex; align-items: center; gap: 14px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }
  .account-card:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.3);
    transform: translateY(-2px);
  }
  .account-card:active { transform: scale(0.98); }
  .card-icon {
    width: 46px; height: 46px; border-radius: 50%; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0;
  }
  .card-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 700; color: #fff; display: block; margin-bottom: 3px; }
  .card-handle { font-size: 12px; color: rgba(255,255,255,0.45); }
  .card-arrow { font-size: 18px; color: rgba(255,255,255,0.35); flex-shrink: 0; margin-left: 4px; }
  .footer { margin-top: 40px; font-size: 11px; color: rgba(255,255,255,0.25); text-align: center; line-height: 2; }

        <span class="card-name">고벤처포럼</span>

        <span class="card-handle">@resaltz_wellness</span>
