<!DOCTYPE html>
<!--
  BRANDRISE 견적서 공유 뷰어 · 비게이트(/share/quote/)
  · 링크 해시(#q=) = lz-string 압축 견적. 받는 사람이 비번 없이 열어 본다(캐퍼빌리티 링크).
  · 렌더는 공유 모듈 BRQuote.buildDoc. 단가 등은 링크 안에 들어있고 서버 저장 없음.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>BRANDRISE · 견적서</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#0f172a;color:#0f172a}
  .bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:#0f172a;color:#fff;padding:11px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  .bar .b{font-size:12.5px;font-weight:700;letter-spacing:.04em;color:#cbd5e1}
  .bar .b b{color:#a5b4fc}
  .bar button{font-family:inherit;font-size:12.5px;font-weight:800;color:#0f172a;background:#a5b4fc;border:0;border-radius:9px;padding:9px 16px;cursor:pointer;transition:.12s}
  .bar button:hover{background:#c7d2fe}
  #frame{width:100%;border:0;display:block;background:#fbfcfd;min-height:calc(100vh - 46px)}
  .msg{max-width:560px;margin:80px auto;padding:0 24px;text-align:center;color:#fff}
  .msg .ic{font-size:40px;margin-bottom:14px}
  .msg h1{font-size:20px;font-weight:800;margin-bottom:10px;letter-spacing:-.02em}
  .msg p{font-size:14px;color:#94a3b8;line-height:1.7}
  @media print{ .bar{display:none} #frame{min-height:0} }
</style>
</head>
<body>

<div class="bar" id="bar" style="display:none">
  <div class="b">BRANDRISE · <b>견적서</b></div>
  <button id="btnPrint" type="button">🖨 인쇄 · PDF로 저장</button>
</div>

<iframe id="frame" style="display:none"></iframe>

<div class="msg" id="msg">
  <div class="ic">🔗</div>
  <h1>견적서를 불러오는 중…</h1>
  <p>잠시만 기다려 주세요.</p>
</div>

<script src="../lz-string.min.js"></script>
<script src="../quote-doc.js"></script>
<script>
(function(){
  var bar=document.getElementById('bar'), frame=document.getElementById('frame'), msg=document.getElementById('msg');

  function fail(title, detail){
    msg.style.display='block'; bar.style.display='none'; frame.style.display='none';
    msg.innerHTML='<div class="ic">⚠️</div><h1>'+title+'</h1><p>'+detail+'</p>';
  }

  // 해시(#q=)에서 견적 상태 디코드 — 해시는 서버로 안 가서 단가가 로그·리퍼러에 안 남는다.
  function readHash(){
    var h=location.hash||'';
    var m=/[#&]q=([^&]+)/.exec(h);
    return m?m[1]:'';
  }

  try{
    if(!window.LZString || !window.BRQuote){ fail('표시할 수 없습니다', '필요한 구성요소를 불러오지 못했습니다. 새로고침해 주세요.'); return; }
    var enc=readHash();
    if(!enc){ fail('견적 정보가 없습니다', '이 페이지는 공유 링크로 열어야 견적이 표시됩니다. 받은 링크 전체를 다시 확인해 주세요.'); return; }

    var json=LZString.decompressFromEncodedURIComponent(enc);
    if(!json){ fail('링크를 읽을 수 없습니다', '링크가 손상되었거나 일부만 복사되었을 수 있습니다. 받은 링크 전체를 다시 열어 주세요.'); return; }

    var packed=JSON.parse(json);
    var doc=BRQuote.buildDoc(BRQuote.unpack(packed));
    if(!doc){ fail('견적 내용이 비어 있습니다', '이 링크에는 표시할 견적 항목이 없습니다.'); return; }

    msg.style.display='none'; bar.style.display='flex'; frame.style.display='block';
    frame.srcdoc=doc;
    frame.onload=function(){
      try{ frame.style.height=(frame.contentWindow.document.body.scrollHeight+40)+'px'; }catch(e){}
      try{ var b=packed.b; if(b) document.title=b+' · 견적서 | BRANDRISE'; }catch(e){}
    };
    document.getElementById('btnPrint').onclick=function(){
      try{ frame.contentWindow.focus(); frame.contentWindow.print(); }catch(e){ window.print(); }
    };
  }catch(e){
    fail('견적서를 표시할 수 없습니다', '링크가 올바르지 않습니다. 보낸 사람에게 링크를 다시 받아 주세요.');
  }
})();
</script>
</body>
</html>
